name: member-site

on:
  push:
    paths:
      - "member-site/**"
      - ".github/workflows/member-site.yml"
  pull_request:
    paths:
      - "member-site/**"
      - ".github/workflows/member-site.yml"

defaults:
  run:
    working-directory: member-site

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: member-site/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build:next
