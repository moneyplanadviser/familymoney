<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>【初月無料】Family Money オンラインサロン</title>
  <meta name="description" content="家計簿はつけてるけど一人だと続かない…そんな方のためのオンラインサロン。330円/月、初月無料。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #f9dfb8;
      --primary-light: #fcecd8;
      --primary-dark: #b8956a;
      --bg: #f8f6f2;
      --bg-card: #ffffff;
      --text: #2c2c2c;
      --text-muted: #5c5c5c;
      --border: #e5e0d8;
      --font: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); color: var(--text); background: var(--bg); line-height: 1.8; min-height: 100vh; }

    .nav {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
    }
    .nav-inner { max-width: 640px; margin: 0 auto; }
    .nav-logo { font-size: 1.1rem; font-weight: 700; color: var(--primary-dark); text-decoration: none; }
    .nav-logo:hover { opacity: 0.9; }

    .container { max-width: 560px; margin: 0 auto; padding: 40px 24px 64px; }

    .hero {
      text-align: center;
      padding: 40px 0 32px;
    }
    .hero-badge {
      font-size: 0.8rem;
      color: var(--primary-dark);
      font-weight: 600;
      margin-bottom: 16px;
    }
    .hero h1 {
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .hero-lead {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .hero-price {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    .hero-price strong { color: var(--text); }
    .cta-btn {
      display: inline-block;
      background: var(--primary-dark);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .cta-btn:hover { opacity: 0.9; }

    .section { margin-bottom: 40px; }
    .section-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .fit-list {
      list-style: none;
      font-size: 0.95rem;
      color: var(--text);
    }
    .fit-list li {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .fit-list li:last-child { border-bottom: none; }

    .note-link {
      text-align: center;
      padding: 32px 0;
      border-top: 1px solid var(--border);
    }
    .note-link p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .footer {
      text-align: center;
      padding: 24px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .footer a { color: var(--text-muted); text-decoration: none; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Family Money</a>
    </div>
  </nav>

  <main class="container">
    <header class="hero">
      <p class="hero-badge">初月無料キャンペーン（〜2026/04/30）</p>
      <h1>家計簿はつけてるけど、<br>一人だと続かない人のためのサロン</h1>
      <p class="hero-lead">仲間と一緒に家計を見る時間があるから、続く。</p>
      <p class="hero-price"><strong>330円/月（税込）</strong>　初月無料</p>
      <a href="https://note.com/familymoney/membership" target="_blank" rel="noopener noreferrer" class="cta-btn">詳しく見る・入会する</a>
    </header>

    <section class="section">
      <h2 class="section-title">こんな方に</h2>
      <ul class="fit-list">
        <li>家計簿はつけてるけど貯まらない</li>
        <li>一人だと続かない</li>
        <li>何をどう見直せばいいかわからない</li>
        <li>仲間と一緒に整えたい</li>
      </ul>
    </section>

    <div class="note-link">
      <p>週1の記事・月1のセミナー・相談会・作業会など、内容の詳細はnoteで。</p>
      <a href="https://note.com/familymoney/membership" target="_blank" rel="noopener noreferrer" class="cta-btn">noteで詳しく見る</a>
    </div>
  </main>

  <footer class="footer">
    <a href="index.html">Family Money</a>
  </footer>
</body>
</html>
